server.port=8084
spring.application.name=motus-game-service

# ── Base de données ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/db_motus
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Services appelés ──────────────────────────────────────────────────────────
services.player.url=http://localhost:8081
services.dictionary.url=http://localhost:8082
services.history.url=http://localhost:8083

# ── JWT (même secret que player-service) ─────────────────────────────────────
jwt.secret=motus-miage-dauphine-secret-key-2026-super-long-string
jwt.expiration=86400000

# ── Clé interne inter-services ────────────────────────────────────────────────
internal.service.key=motus-internal-service-key-2026
