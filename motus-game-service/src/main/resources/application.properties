server.port=8084
spring.application.name=motus-game-service

# ── Base de données ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/db_motus
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Services appelés ──────────────────────────────────────────────────────────
services.player.url=http://localhost:8081
services.dictionary.url=http://localhost:8082
services.history.url=http://localhost:8083

# ── Observabilité (Actuator + Prometheus) ─────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true
management.metrics.tags.application=${spring.application.name}

# ── Résilience (Resilience4j) — appels vers player/dictionary/history ────────
resilience4j.circuitbreaker.instances.player-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.player-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.player-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.player-service.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.dictionary-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.dictionary-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.dictionary-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.dictionary-service.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.history-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.history-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.history-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.history-service.permitted-number-of-calls-in-half-open-state=3

resilience4j.retry.instances.player-service.max-attempts=3
resilience4j.retry.instances.player-service.wait-duration=300ms
resilience4j.retry.instances.dictionary-service.max-attempts=3
resilience4j.retry.instances.dictionary-service.wait-duration=300ms
resilience4j.retry.instances.history-service.max-attempts=2
resilience4j.retry.instances.history-service.wait-duration=300ms
