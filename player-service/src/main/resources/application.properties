server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/db_players
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT (secret partagé avec tous les services) ──────────────────────────────
# Clé d'au moins 32 caractères (256 bits) pour HS256
jwt.secret=motus-miage-dauphine-secret-key-2026-super-long-string
jwt.expiration=86400000

# ── Compte admin créé au démarrage (DataInitializer) ─────────────────────────
admin.pseudo=admin
admin.email=admin@motus.fr
admin.password=Admin1234!
