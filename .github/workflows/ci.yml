name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - player-service
          - dictionary-service
          - history-stat-service
          - motus-game-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Build and test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: ./mvnw -B verify

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build all service images
        run: docker compose build
