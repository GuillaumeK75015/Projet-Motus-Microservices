services:

  # ── Base de données ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: db_players
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - motus-net

  # ── Microservices ──────────────────────────────────────────────────────────
  # mem_limit + JAVA_TOOL_OPTIONS : sans limite, chaque JVM dimensionne son heap
  # sur la RAM totale de la VM Docker (heap énorme × 6 services → saturation mémoire).
  player-service:
    build: ./player-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_players
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65 -Xss512k"
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - motus-net

  dictionary-service:
    build: ./dictionary-service
    ports:
      - "8082:8082"
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65 -Xss512k"
    mem_limit: 450m
    networks:
      - motus-net

  history-stat-service:
    build: ./history-stat-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_history
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65 -Xss512k"
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - motus-net

  motus-game-service:
    build: ./motus-game-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_motus
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SERVICES_PLAYER_URL: http://player-service:8081
      SERVICES_DICTIONARY_URL: http://dictionary-service:8082
      SERVICES_HISTORY_URL: http://history-stat-service:8083
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65 -Xss512k"
    mem_limit: 450m
    depends_on:
      postgres:
        condition: service_healthy
      player-service:
        condition: service_started
      dictionary-service:
        condition: service_started
      history-stat-service:
        condition: service_started
    restart: on-failure
    networks:
      - motus-net

  # ── API Gateway (point d'entrée unique) ────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVICES_PLAYER_URL: http://player-service:8081
      SERVICES_HISTORY_URL: http://history-stat-service:8083
      SERVICES_GAME_URL: http://motus-game-service:8084
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65 -Xss512k"
    mem_limit: 320m
    depends_on:
      player-service:
        condition: service_started
      history-stat-service:
        condition: service_started
      motus-game-service:
        condition: service_started
    restart: on-failure
    networks:
      - motus-net

  # ── Observabilité (optionnelle) ─────────────────────────────────────────────
  # Ne démarre PAS par défaut (profil "observability") pour économiser la RAM.
  # Activer avec : docker-compose --profile observability up
  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - motus-net

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - motus-net

volumes:
  postgres-data:
  grafana-data:

networks:
  motus-net:
    driver: bridge
