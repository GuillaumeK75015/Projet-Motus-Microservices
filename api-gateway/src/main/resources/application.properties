server.port=8080
spring.application.name=api-gateway

# ── Services appelés ──────────────────────────────────────────────────────────
services.player.url=http://localhost:8081
services.history.url=http://localhost:8083
services.game.url=http://localhost:8084

# ── Observabilité (Actuator + Prometheus) ─────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true
management.metrics.tags.application=${spring.application.name}

# ── Résilience (Resilience4j) ─────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.player-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.player-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.player-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.player-service.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.history-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.history-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.history-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.history-service.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.game-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.game-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.game-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.game-service.permitted-number-of-calls-in-half-open-state=3

resilience4j.retry.instances.player-service.max-attempts=3
resilience4j.retry.instances.player-service.wait-duration=300ms
resilience4j.retry.instances.history-service.max-attempts=3
resilience4j.retry.instances.history-service.wait-duration=300ms
resilience4j.retry.instances.game-service.max-attempts=3
resilience4j.retry.instances.game-service.wait-duration=300ms
