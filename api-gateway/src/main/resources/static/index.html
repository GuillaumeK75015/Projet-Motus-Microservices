<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOTUS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #121213;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-bottom: 4px solid transparent;
      border-image: linear-gradient(90deg, #c62828, #f2c744, #1565c0) 1;
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 900;
      letter-spacing: 8px;
      color: #fff;
    }

    /* Plateau large : assez pour accueillir un mot de 10 lettres sans être serré */
    .container {
      max-width: 780px;
      width: 100%;
      padding: 28px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    /* Les formulaires (connexion, stats…) restent lisibles ; seul le plateau utilise toute la largeur */
    .controls-row, .guess-row, .legend, #message {
      width: 100%;
      max-width: 480px;
    }

    /* ── Cards ── */
    .card {
      background: #1a1a1b;
      border: 1px solid #3a3a3c;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
    }
    /* Panneau admin : plus large pour accueillir le tableau des parties */
    #admin-card { max-width: 720px; }

    .card-title {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #818384;
      margin-bottom: 14px;
    }

    /* ── Inputs ── */
    input[type=text], input[type=email], input[type=password], input[type=date] {
      width: 100%;
      background: #121213;
      border: 2px solid #3a3a3c;
      border-radius: 8px;
      padding: 11px 14px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      color-scheme: dark;
    }
    input:focus { border-color: #538d4e; }
    input::placeholder { color: #555; }

    /* ── Buttons ── */
    .btn {
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: filter .15s;
    }
    .btn:hover { filter: brightness(1.15); }
    .btn:disabled { filter: brightness(.5); cursor: not-allowed; }
    .btn-green  { background: #538d4e; color: #fff; }
    .btn-grey   { background: #3a3a3c; color: #fff; }
    .btn-yellow { background: #b59f3b; color: #fff; }
    .btn-full   { width: 100%; }

    /* ── Player bar ── */
    .player-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 42px; height: 42px;
      background: #538d4e;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.3rem;
      flex-shrink: 0;
    }
    .player-meta { flex: 1; }
    .player-meta strong { display: block; font-size: 1.05rem; }
    .player-meta small  { color: #818384; font-size: .78rem; }

    /* ── Game controls row ── */
    .controls-row { display: flex; gap: 10px; }
    .controls-row .btn { flex: 1; }

    /* ── Message banner ── */
    #message {
      border-radius: 8px;
      padding: 12px 16px;
      font-weight: 600;
      text-align: center;
      display: none;
    }
    #message.info    { background: #2a2a2c; display: block; }
    #message.success { background: #2d5a27; display: block; }
    #message.error   { background: #5a2727; display: block; }
    #message.defeat  { background: #5a2727; display: block; }

    /* ── Board ── */
    #board-wrap { display: flex; justify-content: center; width: 100%; overflow-x: auto; }
    #board { display: flex; flex-direction: column; gap: 8px; }
    .tile-row { display: flex; gap: 8px; }

    .tile {
      width: 58px; height: 58px;
      border: 3px solid #3a3a3c;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 900;
      text-transform: uppercase;
      user-select: none;
      transition: background .25s, border-color .25s, color .25s;
      flex-shrink: 0;
    }
    .tile.empty    { background: transparent; }
    .tile.first    { background: #1565c0; border-color: #1565c0; color: #fff; }
    .tile.correct  { background: #538d4e; border-color: #538d4e; color: #fff; }
    .tile.present  { background: #b59f3b; border-color: #b59f3b; color: #fff; }
    .tile.absent   { background: #3a3a3c; border-color: #3a3a3c; color: #fff; }

    @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .pop   { animation: pop   .15s ease; }
    .shake { animation: shake .3s ease; }

    /* ── Guess input row ── */
    .guess-row { display: flex; gap: 10px; }
    .guess-row input {
      flex: 1;
      font-size: 1.2rem; font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 13px 14px;
    }
    .guess-row .btn { flex-shrink: 0; }

    /* ── Legend ── */
    .legend {
      display: flex; gap: 16px; justify-content: center;
      font-size: .75rem; color: #818384;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot  { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    /* ── Modal ── */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal.open { display: flex; }
    .modal-box {
      background: #1a1a1b;
      border: 1px solid #3a3a3c;
      border-radius: 16px;
      padding: 32px 28px;
      width: 320px; text-align: center;
    }
    .modal-box h2 { margin-bottom: 24px; letter-spacing: 2px; font-size: 1.2rem; }
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 20px; margin-bottom: 24px;
    }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-num  { font-size: 2.2rem; font-weight: 900; color: #538d4e; }
    .stat-lbl  { font-size: .7rem; color: #818384; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>MOTUS</h1>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="login-card">
    <p class="card-title" id="auth-title">Connexion</p>

    <!-- Mode connexion -->
    <div id="login-mode" style="display:flex;flex-direction:column;gap:10px">
      <input type="text"     id="inp-pseudo"   placeholder="Pseudo" maxlength="30"/>
      <input type="password" id="inp-password" placeholder="Mot de passe"/>
      <button class="btn btn-green btn-full" onclick="login()">Se connecter →</button>
    </div>

    <!-- Mode inscription -->
    <div id="register-mode" class="hidden" style="display:flex;flex-direction:column;gap:10px">
      <input type="text"     id="inp-reg-pseudo"   placeholder="Pseudo" maxlength="30"/>
      <input type="email"    id="inp-reg-email"    placeholder="Email"/>
      <input type="password" id="inp-reg-password" placeholder="Mot de passe"/>
      <button class="btn btn-green btn-full" onclick="register()">Créer le compte</button>
    </div>

    <p style="font-size:.75rem;color:#818384;margin-top:12px;text-align:center">
      <a href="#" id="auth-toggle-link" style="color:#818384" onclick="toggleAuthMode();return false">Pas encore de compte ? Créez-en un</a>
    </p>

    <div style="display:flex;align-items:center;gap:10px;margin:14px 0">
      <div style="flex:1;height:1px;background:#3a3a3c"></div>
      <span style="font-size:.7rem;color:#555">OU</span>
      <div style="flex:1;height:1px;background:#3a3a3c"></div>
    </div>
    <button class="btn btn-grey btn-full" onclick="playAsGuest()">Jouer en invité</button>
  </div>

  <!-- ADMIN PANEL -->
  <div class="card hidden" id="admin-card">
    <div class="player-bar">
      <div class="avatar" style="background:#b59f3b" id="admin-av-letter">A</div>
      <div class="player-meta">
        <strong>Administrateur</strong>
        <small id="admin-name"></small>
      </div>
      <button class="btn btn-grey" style="padding:8px 12px;font-size:.8rem" onclick="adminLogout()">Déconnexion</button>
    </div>
    <button class="btn btn-grey btn-full" style="margin-top:14px" onclick="openClassement()">Voir le classement</button>

    <div style="margin-top:16px">
      <p class="card-title" style="margin-bottom:8px">Joueurs</p>
      <div id="players-results" style="max-height:260px;overflow-y:auto;font-size:.82rem"></div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">
      <p class="card-title" style="margin-bottom:0">Rechercher des parties</p>
      <div style="display:flex;gap:8px">
        <input type="text" id="adm-pseudo" placeholder="Pseudo du joueur" style="flex:1" oninput="adminSearchDebounced()"/>
        <input type="date" id="adm-date"   placeholder="Date"             style="flex:1;color-scheme:dark" onchange="adminSearch()"/>
      </div>
      <div style="display:flex;gap:8px">
        <select id="adm-gagne" onchange="adminSearch()" style="flex:1;background:#121213;border:2px solid #3a3a3c;border-radius:8px;color:#fff;padding:11px">
          <option value="">Résultat : tous</option>
          <option value="true">Gagnées</option>
          <option value="false">Perdues</option>
        </select>
        <button class="btn btn-grey" style="flex:1" onclick="adminResetFilters()">Réinitialiser</button>
      </div>
    </div>
    <div id="admin-results" style="margin-top:14px;max-height:320px;overflow-y:auto;font-size:.82rem"></div>
  </div>

  <!-- PLAYER BAR -->
  <div class="card hidden" id="player-card">
    <div class="player-bar">
      <div class="avatar" id="av-letter">?</div>
      <div class="player-meta">
        <strong id="av-name"></strong>
        <small>ID joueur : <span id="av-id"></span></small>
      </div>
      <button class="btn btn-grey" style="padding:8px 12px;font-size:.8rem" onclick="logout()">Changer</button>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-row hidden" id="ctrl-row">
    <button class="btn btn-green" onclick="startNewGame()">Nouvelle Partie</button>
    <button class="btn btn-grey"  onclick="openStats()">Mes Stats</button>
    <button class="btn btn-grey"  onclick="openClassement()">Classement</button>
  </div>

  <!-- MESSAGE -->
  <div id="message"></div>

  <!-- BOARD -->
  <div id="board-wrap"><div id="board"></div></div>

  <!-- LEGEND -->
  <div class="legend hidden" id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#538d4e"></div>Bien placé</div>
    <div class="legend-item"><div class="legend-dot" style="background:#b59f3b"></div>Mal placé</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3a3a3c"></div>Absent</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1565c0"></div>1ʳᵉ lettre</div>
  </div>

  <!-- GUESS INPUT -->
  <div class="guess-row hidden" id="guess-row">
    <input type="text" id="inp-guess" placeholder="Votre mot…" maxlength="25"
           onkeydown="if(event.key==='Enter')submitGuess()"/>
    <button class="btn btn-green" onclick="submitGuess()">OK</button>
  </div>

  <!-- SHARE (visible en fin de partie) -->
  <button class="btn btn-yellow btn-full hidden" id="share-btn" style="max-width:480px"
          onclick="shareResult()">📋 Partager mon score</button>

</div>

<!-- STATS MODAL -->
<div class="modal" id="stats-modal" onclick="if(event.target===this)closeStats()">
  <div class="modal-box">
    <h2>MES STATISTIQUES</h2>
    <div class="stats-grid">
      <div class="stat-item"><span class="stat-num" id="s-played">—</span><span class="stat-lbl">Parties</span></div>
      <div class="stat-item"><span class="stat-num" id="s-wins">—</span><span class="stat-lbl">Victoires</span></div>
      <div class="stat-item"><span class="stat-num" id="s-rate">—</span><span class="stat-lbl">% Victoires</span></div>
      <div class="stat-item"><span class="stat-num" id="s-avg">—</span><span class="stat-lbl">Moy. essais</span></div>
    </div>
    <button class="btn btn-grey btn-full" onclick="closeStats()">Fermer</button>
  </div>
</div>

<!-- CLASSEMENT MODAL -->
<div class="modal" id="classement-modal" onclick="if(event.target===this)closeClassement()">
  <div class="modal-box" style="width:340px">
    <h2>CLASSEMENT</h2>
    <div id="classement-list" style="max-height:320px;overflow-y:auto;margin-bottom:20px;text-align:left"></div>
    <button class="btn btn-grey btn-full" onclick="closeClassement()">Fermer</button>
  </div>
</div>

<script>
  /* ── State ─────────────────────────────────────────────────────────── */
  let playerId   = null;
  let playerName = null;
  let gameId     = null;
  let wordLen    = 0;
  let maxTries   = 6;
  let gameOver   = false;
  let lastGame   = null;   // dernière partie reçue (sert au partage emoji)

  /* ── Init ───────────────────────────────────────────────────────────── */
  window.onload = () => {
    const savedAdmin = localStorage.getItem('motus_admin');
    if (savedAdmin) {
      try {
        const a = JSON.parse(savedAdmin);
        showAdminUI(a.pseudo);
        return;
      } catch(_) { localStorage.removeItem('motus_admin'); }
    }

    const saved = localStorage.getItem('motus_player');
    if (saved) {
      try {
        const p = JSON.parse(saved);
        playerId = p.id; playerName = p.pseudo;
        showPlayerUI();
        msg('Bienvenue, ' + playerName + ' !  Cliquez sur « Nouvelle Partie » pour jouer.', 'info');
      } catch(_) { localStorage.removeItem('motus_player'); }
    }
  };

  /* ── Login / Register (interface unique joueur + admin) ──────────────── */
  let authMode = 'login';

  function toggleAuthMode() {
    authMode = authMode === 'login' ? 'register' : 'login';
    clearMsg();
    if (authMode === 'register') {
      hide('login-mode'); show('register-mode');
      $('auth-title').textContent = 'Créer un compte';
      $('auth-toggle-link').textContent = 'Déjà un compte ? Connectez-vous';
    } else {
      show('login-mode'); hide('register-mode');
      $('auth-title').textContent = 'Connexion';
      $('auth-toggle-link').textContent = 'Pas encore de compte ? Créez-en un';
    }
  }

  async function login() {
    const pseudo   = get('inp-pseudo').trim();
    const password = get('inp-password');
    if (!pseudo || !password) { msg('Veuillez entrer un pseudo et un mot de passe.', 'error'); return; }

    const r = await apiPost('/api/proxy/auth/login', { pseudo, password });
    if (!r.ok) { msg('Pseudo ou mot de passe incorrect.', 'error'); return; }
    const data = await r.json();

    if (data.role === 'ROLE_ADMIN') {
      localStorage.setItem('motus_admin', JSON.stringify({ token: data.token, pseudo: data.pseudo }));
      showAdminUI(data.pseudo);
    } else {
      savePlayer(data.id, data.pseudo);
      showPlayerUI();
      msg('Content de vous revoir, ' + data.pseudo + ' !', 'success');
    }
  }

  async function register() {
    const pseudo   = get('inp-reg-pseudo').trim();
    const email    = get('inp-reg-email').trim();
    const password = get('inp-reg-password');
    if (!pseudo || !email || !password) { msg('Veuillez remplir le pseudo, l\'email et le mot de passe.', 'error'); return; }

    const reg = await apiPost('/api/proxy/players', { pseudo, email, password });
    if (reg.ok || reg.status === 201) {
      const p = await reg.json();
      savePlayer(p.id, p.pseudo);
      showPlayerUI();
      msg('Compte créé ! Bienvenue, ' + p.pseudo + ' !', 'success');
    } else {
      const txt = await reg.text();
      msg(txt || 'Erreur lors de la création du compte.', 'error');
    }
  }

  async function playAsGuest() {
    const r = await apiPost('/api/proxy/players/guest', {});
    if (!r.ok) { msg('Impossible de démarrer une partie invité pour le moment.', 'error'); return; }
    const p = await r.json();
    savePlayer(p.id, p.pseudo);
    showPlayerUI();
    msg('Bienvenue ' + p.pseudo + ' ! Vous jouez en invité (compte non sauvegardé).', 'info');
  }

  function savePlayer(id, pseudo) {
    playerId = id; playerName = pseudo;
    localStorage.setItem('motus_player', JSON.stringify({ id, pseudo }));
  }

  function showPlayerUI() {
    hide('login-card');
    show('player-card'); show('ctrl-row');
    $('av-letter').textContent = playerName.charAt(0).toUpperCase();
    $('av-name').textContent   = playerName;
    $('av-id').textContent     = playerId;
  }

  function logout() {
    localStorage.removeItem('motus_player');
    playerId = playerName = gameId = null;
    gameOver = false;
    resetAuthMode();
    show('login-card');
    hide('player-card'); hide('ctrl-row'); hide('guess-row'); hide('legend'); hide('share-btn');
    $('board').innerHTML = '';
    lastGame = null;
    clearMsg();
  }

  function resetAuthMode() {
    authMode = 'login';
    show('login-mode'); hide('register-mode');
    $('auth-title').textContent = 'Connexion';
    $('auth-toggle-link').textContent = 'Pas encore de compte ? Créez-en un';
  }

  /* ── Admin ──────────────────────────────────────────────────────────── */
  function adminLogout() {
    localStorage.removeItem('motus_admin');
    resetAuthMode();
    hide('admin-card');
    show('login-card');
    $('admin-results').innerHTML = '';
  }

  function showAdminUI(pseudo) {
    hide('login-card'); hide('player-card'); hide('ctrl-row'); hide('guess-row'); hide('legend'); hide('share-btn');
    $('board').innerHTML = ''; clearMsg();
    $('admin-name').textContent = pseudo;
    show('admin-card');
    adminSearch();
    loadPlayers();
  }

  async function loadPlayers() {
    const r = await apiAdminGet('/api/proxy/players');
    if (!r.ok) { adminHandleAuthError(r); return; }
    renderPlayers(await r.json());
  }

  let lastPlayersList = [];

  function renderPlayers(players) {
    lastPlayersList = players || [];
    const el = $('players-results');
    if (!players || players.length === 0) {
      el.innerHTML = '<p style="color:#818384">Aucun joueur.</p>';
      return;
    }
    const rows = players.map(p => `
      <tr>
        <td>${p.id}</td>
        <td>${esc(p.pseudo)}</td>
        <td>${esc(p.email)}</td>
        <td>${p.role === 'ROLE_ADMIN' ? 'Admin' : 'Joueur'}</td>
        <td>${p.role === 'ROLE_ADMIN' ? '' :
              `<button class="btn btn-grey" style="padding:4px 10px;font-size:.75rem" onclick="deletePlayer(${p.id})">Supprimer</button>`}</td>
      </tr>`).join('');
    el.innerHTML = `
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="color:#818384;text-align:left">
            <th style="padding:4px">#</th><th style="padding:4px">Pseudo</th><th style="padding:4px">Email</th>
            <th style="padding:4px">Rôle</th><th style="padding:4px"></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function deletePlayer(id) {
    const p = lastPlayersList.find(j => j.id === id);
    const pseudo = p ? p.pseudo : ('#' + id);
    if (!confirm('Supprimer le joueur "' + pseudo + '" et tout son historique ? Cette action est irréversible.')) return;
    const r = await fetch('/api/proxy/players/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + adminToken() }
    });
    if (!r.ok) { adminHandleAuthError(r); return; }
    loadPlayers();
    adminSearch();
  }

  function adminToken() {
    const saved = localStorage.getItem('motus_admin');
    return saved ? JSON.parse(saved).token : null;
  }

  async function apiAdminGet(url) {
    return fetch(url, { headers: { 'Authorization': 'Bearer ' + adminToken() } });
  }

  function adminResetFilters() {
    $('adm-pseudo').value = ''; $('adm-date').value = ''; $('adm-gagne').value = '';
    adminSearch();
  }

  // Recherche "live" : relancée automatiquement à chaque changement de filtre
  async function adminSearch() {
    const pseudo = get('adm-pseudo').trim();
    const date   = get('adm-date').trim();
    const gagne  = get('adm-gagne');
    const params = new URLSearchParams();
    if (date)  params.set('date', date);
    if (gagne) params.set('gagne', gagne);

    if (pseudo) {
      const found = await apiAdminGet('/api/proxy/players/pseudo/' + encodeURIComponent(pseudo));
      if (!found.ok) {
        $('admin-results').innerHTML = '<p style="color:#818384">Aucun joueur avec ce pseudo.</p>';
        return;
      }
      const p = await found.json();
      params.set('joueurId', p.id);
    }

    const r = await apiAdminGet('/api/proxy/search?' + params.toString());
    if (!r.ok) { adminHandleAuthError(r); return; }
    renderAdminResults(await r.json());
  }

  let adminSearchDebounce = null;
  function adminSearchDebounced() {
    clearTimeout(adminSearchDebounce);
    adminSearchDebounce = setTimeout(adminSearch, 400);
  }

  function adminHandleAuthError(r) {
    if (r.status === 401 || r.status === 403) {
      $('admin-results').innerHTML = '<p style="color:#e06c75">Session admin expirée ou invalide, veuillez vous reconnecter.</p>';
      adminLogout();
    } else {
      $('admin-results').innerHTML = '<p style="color:#e06c75">Erreur lors de la récupération des parties.</p>';
    }
  }

  function renderAdminResults(parties) {
    if (!parties || parties.length === 0) {
      $('admin-results').innerHTML = '<p style="color:#818384">Aucune partie trouvée.</p>';
      return;
    }
    const rows = parties.map(p => `
      <tr>
        <td>${p.id}</td>
        <td>${esc(p.pseudoJoueur ?? ('Joueur #' + p.joueurId))}</td>
        <td>${esc(p.motSecret ?? '')}</td>
        <td>${p.nombreTentatives}</td>
        <td>${p.gagne ? '✅' : '❌'}</td>
        <td>${p.dateFin ? p.dateFin.replace('T', ' ').slice(0, 16) : ''}</td>
      </tr>`).join('');
    $('admin-results').innerHTML = `
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="color:#818384;text-align:left">
            <th style="padding:4px">#</th><th style="padding:4px">Joueur</th><th style="padding:4px">Mot</th>
            <th style="padding:4px">Essais</th><th style="padding:4px">Résultat</th><th style="padding:4px">Date</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  /* ── Game ───────────────────────────────────────────────────────────── */
  async function startNewGame() {
    if (!playerId) return;
    gameOver = false; lastGame = null; clearMsg(); hide('share-btn');

    const r = await apiPost('/api/games/start', { joueurId: playerId });
    if (!r.ok) { msg(await r.text(), 'error'); return; }

    const game = await r.json();
    gameId   = game.id;
    wordLen  = game.longueurMot;
    maxTries = game.tentativesMax;

    buildBoard(wordLen, maxTries);
    renderGame(game);

    show('guess-row'); show('legend');
    $('inp-guess').value = '';
    $('inp-guess').focus();
    msg('Partie #' + gameId + ' — mot de ' + game.longueurMot + ' lettres. Première lettre : ' + game.premiereLettre, 'info');
  }

  async function submitGuess() {
    if (!gameId || gameOver) return;
    const mot = $('inp-guess').value.trim().toUpperCase();
    if (!mot) return;
    $('inp-guess').value = '';

    const r = await apiPost('/api/games/' + gameId + '/guess', { mot });
    if (!r.ok) {
      try { const err = await r.json(); msg(err.message || 'Erreur.', 'error'); }
      catch(_) { msg('Erreur lors de la tentative.', 'error'); }
      shakeRow(document.querySelector('.tile-row:not(.done)'));
      $('inp-guess').focus();
      return;
    }

    const game = await r.json();
    renderGame(game);

    if (game.statut === 'GAGNE') {
      gameOver = true;
      hide('guess-row'); show('share-btn');
      msg('🎉 ' + game.message, 'success');
    } else if (game.statut === 'PERDU') {
      gameOver = true;
      hide('guess-row'); show('share-btn');
      msg('😞 ' + game.message, 'defeat');
    } else {
      msg(game.message, 'info');
      $('inp-guess').focus();
    }
  }

  /* ── Board rendering ────────────────────────────────────────────────── */
  function buildBoard(w, rows) {
    const board = $('board');
    board.innerHTML = '';
    for (let r = 0; r < rows; r++) {
      const row = document.createElement('div');
      row.className = 'tile-row';
      row.id = 'row-' + r;
      for (let c = 0; c < w; c++) {
        const tile = document.createElement('div');
        tile.className = 'tile empty';
        tile.id = 'tile-' + r + '-' + c;
        row.appendChild(tile);
      }
      board.appendChild(row);
    }
  }

  function renderGame(game) {
    lastGame = game;
    const tries = game.tentatives || [];

    tries.forEach((t, row) => {
      const lettres = t.lettres;
      const domRow  = $('row-' + row);
      if (domRow) domRow.classList.add('done');
      for (let c = 0; c < lettres.length; c++) {
        const tile = $('tile-' + row + '-' + c);
        if (!tile) continue;
        tile.textContent = lettres[c].lettre;
        tile.className   = 'tile ' + fbClass(lettres[c].resultat);
        tile.classList.add('pop');
        tile.addEventListener('animationend', () => tile.classList.remove('pop'), { once: true });
      }
    });

    // Révèle la première lettre de la ligne suivante tant que la partie est en cours
    if (game.statut === 'EN_COURS') {
      const nextRow  = tries.length;
      const firstTile = $('tile-' + nextRow + '-0');
      if (firstTile && !firstTile.classList.contains('correct')) {
        firstTile.textContent = game.premiereLettre;
        firstTile.className   = 'tile first';
      }
    }
  }

  function fbClass(fb) {
    if (fb === 'BIEN_PLACE') return 'correct';
    if (fb === 'MAL_PLACE')  return 'present';
    return 'absent';
  }

  function shakeRow(row) {
    if (!row) return;
    row.classList.add('shake');
    row.addEventListener('animationend', () => row.classList.remove('shake'), { once: true });
  }

  /* ── Stats ──────────────────────────────────────────────────────────── */
  async function openStats() {
    if (!playerId) return;
    const r = await apiGet('/api/proxy/stats/' + playerId);
    if (r.ok) {
      const s = await r.json();
      $('s-played').textContent = s.partiesJouees;
      $('s-wins').textContent   = s.partiesGagnees;
      $('s-rate').textContent   = s.tauxVictoire.toFixed(1) + ' %';
      $('s-avg').textContent    = s.moyenneTentatives.toFixed(1);
    } else {
      ['s-played','s-wins','s-rate','s-avg'].forEach(id => $( id).textContent = '—');
    }
    $('stats-modal').classList.add('open');
  }
  function closeStats() { $('stats-modal').classList.remove('open'); }

  /* ── Classement ─────────────────────────────────────────────────────── */
  async function openClassement() {
    const r = await apiGet('/api/proxy/classement');
    const list = $('classement-list');
    if (r.ok) {
      const classement = await r.json();
      if (classement.length === 0) {
        list.innerHTML = '<p style="color:#818384;text-align:center">Aucune partie jouée pour le moment.</p>';
      } else {
        list.innerHTML = classement.map(c => {
          const nom = esc(c.pseudoJoueur ?? ('Joueur #' + c.joueurId));
          return `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #3a3a3c">
            <strong style="width:24px">#${c.rang}</strong>
            <span style="flex:1">${c.joueurId === playerId ? nom + ' (vous)' : nom}</span>
            <span style="color:#818384;font-size:.8rem">${c.partiesGagnees}/${c.partiesJouees} · ${c.tauxVictoire.toFixed(1)}%</span>
          </div>`;
        }).join('');
      }
    } else {
      list.innerHTML = '<p style="color:#e06c75;text-align:center">Erreur lors de la récupération du classement.</p>';
    }
    $('classement-modal').classList.add('open');
  }
  function closeClassement() { $('classement-modal').classList.remove('open'); }

  /* ── Partage du score (grille emoji façon Wordle/Motus) ──────────────── */
  const SHARE_EMOJI = { BIEN_PLACE: '🟩', MAL_PLACE: '🟨', ABSENT: '⬛' };

  // Construit le texte partageable à partir de la dernière partie terminée.
  function buildShareText() {
    if (!lastGame || lastGame.statut === 'EN_COURS') return null;
    const tries = lastGame.tentatives || [];
    const grid  = tries
      .map(t => t.lettres.map(l => SHARE_EMOJI[l.resultat] || '⬛').join(''))
      .join('\n');
    const max   = lastGame.tentativesMax || maxTries;
    // Comme Wordle : n/max si gagné, X/max si perdu
    const score = lastGame.statut === 'GAGNE' ? (tries.length + '/' + max) : ('X/' + max);
    const url   = window.location.origin || window.location.href;
    return 'MOTUS · ' + lastGame.longueurMot + ' lettres · ' + score + '\n\n' + grid + '\n\n' + url;
  }

  async function shareResult() {
    const text = buildShareText();
    if (!text) return;

    // Copie dans le presse-papier (API moderne)
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try {
        await navigator.clipboard.writeText(text);
        msg('Résultat copié dans le presse-papier ! 📋', 'success');
        return;
      } catch (_) { /* ex : contexte non sécurisé (http) → fallback ci-dessous */ }
    }
    // Fallback universel (vieux navigateurs / http)
    fallbackCopy(text);
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (_) { ok = false; }
    document.body.removeChild(ta);
    msg(ok ? 'Résultat copié ! Collez-le où vous voulez 📋'
           : 'Copie impossible — sélectionnez le texte du plateau manuellement.',
        ok ? 'success' : 'error');
  }

  /* ── Helpers ─────────────────────────────────────────────────────────── */
  function $(id)   { return document.getElementById(id); }
  function get(id) { return $(id).value; }

  // Échappe les valeurs affichées via innerHTML (pseudo, email... sont saisis par l'utilisateur)
  function esc(str) {
    return String(str ?? '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function show(id){ $(id).classList.remove('hidden'); }
  function hide(id){ $(id).classList.add('hidden'); }

  function msg(text, type) {
    const el = $('message');
    el.textContent = text;
    el.className = type;
  }
  function clearMsg() {
    const el = $('message');
    el.textContent = '';
    el.className   = '';
  }

  async function apiGet(url)      { return fetch(url); }
  async function apiPost(url, body) {
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  }
</script>
</body>
</html>
