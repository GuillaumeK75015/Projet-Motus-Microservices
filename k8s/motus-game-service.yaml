apiVersion: apps/v1
kind: Deployment
metadata:
  name: motus-game-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: motus-game-service
  template:
    metadata:
      labels:
        app: motus-game-service
    spec:
      containers:
        - name: motus-game-service
          image: motus-game-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/db_motus
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: SERVICES_PLAYER_URL
              value: http://player-service:8081
            - name: SERVICES_DICTIONARY_URL
              value: http://dictionary-service:8082
            - name: SERVICES_HISTORY_URL
              value: http://history-stat-service:8083
          readinessProbe:
            httpGet:
              path: /api/games
              port: 8084
            initialDelaySeconds: 35
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: motus-game-service
spec:
  type: NodePort
  selector:
    app: motus-game-service
  ports:
    - port: 8084
      targetPort: 8084
      nodePort: 30084
