apiVersion: apps/v1
kind: Deployment
metadata:
  name: motus-game-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: motus-game-service
  template:
    metadata:
      labels:
        app: motus-game-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres -p 5432 -U postgres; do echo waiting for postgres; sleep 2; done
      containers:
        - name: motus-game-service
          image: motus-game-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/db_motus
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: SERVICES_PLAYER_URL
              value: http://player-service:8081
            - name: SERVICES_DICTIONARY_URL
              value: http://dictionary-service:8082
            - name: SERVICES_HISTORY_URL
              value: http://history-stat-service:8083
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=65 -Xss512k"
          resources:
            requests:
              cpu: "150m"
              memory: "220Mi"
            limits:
              cpu: "750m"
              memory: "320Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 35
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 45
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: motus-game-service
spec:
  selector:
    app: motus-game-service
  ports:
    - port: 8084
      targetPort: 8084
