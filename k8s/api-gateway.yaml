apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SERVICES_PLAYER_URL
              value: http://player-service:8081
            - name: SERVICES_HISTORY_URL
              value: http://history-stat-service:8083
            - name: SERVICES_GAME_URL
              value: http://motus-game-service:8084
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=65 -Xss512k"
          resources:
            requests:
              cpu: "150m"
              memory: "300Mi"
            limits:
              cpu: "750m"
              memory: "450Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 35
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
